services:
  ezlocalai:
    container_name: ezlocalai
    build:
      context: .
      dockerfile: cuda.Dockerfile
    env_file:
      - .env
    environment:
      - EZLOCALAI_URL=${EZLOCALAI_URL:-http://localhost:8091}
      - EZLOCALAI_API_KEY=${EZLOCALAI_API_KEY:-}
      - MAIN_GPU=${MAIN_GPU:-0}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-unsloth/Qwen3.5-4B-GGUF}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - IMG_MODEL=${IMG_MODEL:-}
      - LLM_BATCH_SIZE=${LLM_BATCH_SIZE:-2048}
      - CUDA_DOCKER_ARCH=all
      - TENSOR_SPLIT=${TENSOR_SPLIT:-}
      - TOKENIZERS_PARALLELISM=false
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-16}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
      - VOICE_SERVER=${VOICE_SERVER:-}
      - VOICE_SERVER_API_KEY=${VOICE_SERVER_API_KEY:-}
      - LAZY_LOAD_VOICE=${LAZY_LOAD_VOICE:-false}
      - TTS_PROVIDER=${TTS_PROVIDER:-chatterbox}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "5"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8091:8091"
    volumes:
      - ./models:/app/models
      - ./hf:/root/.cache/huggingface/hub
      - ./outputs:/app/outputs
      - ./voices:/app/voices
      - ./whispercpp:/app/whispercpp
      - ./CosyVoice:/app/CosyVoice
      - ./pretrained_models:/app/pretrained_models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
