services:
  ezlocalai:
    container_name: ezlocalai
    build:
      context: .
      dockerfile: cuda.Dockerfile
    env_file:
      - .env
    environment:
      - EZLOCALAI_URL=${EZLOCALAI_URL:-http://localhost:8091}
      - EZLOCALAI_API_KEY=${EZLOCALAI_API_KEY:-}
      - MAIN_GPU=${MAIN_GPU:-0}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-unsloth/Qwen3.5-4B-GGUF}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - IMAGE_ENABLED=${IMAGE_ENABLED:-false}
      - IMG_MODEL=${IMG_MODEL:-}
      - VIDEO_ENABLED=${VIDEO_ENABLED:-false}
      - VIDEO_MODEL=${VIDEO_MODEL:-}
      - LLM_BATCH_SIZE=${LLM_BATCH_SIZE:-auto}
      - LLM_PROMPT_CACHE_MIB=${LLM_PROMPT_CACHE_MIB:-auto}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-65536}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-16384}
      - N_PARALLEL=${N_PARALLEL:-1}
      - QUANT_TYPE=${QUANT_TYPE:-Q3_K_XL}
      - MTP_SPEC_DRAFT_P_MIN=${MTP_SPEC_DRAFT_P_MIN:-0.25}
      - MTP_SPEC_DRAFT_N_MAX=${MTP_SPEC_DRAFT_N_MAX:-auto}
      - CUDA_DOCKER_ARCH=all
      - TENSOR_SPLIT=${TENSOR_SPLIT:-}
      - TOKENIZERS_PARALLELISM=false
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
      - VOICE_SERVER=${VOICE_SERVER:-}
      - VOICE_SERVER_API_KEY=${VOICE_SERVER_API_KEY:-}
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - TTS_N_PARALLEL=${TTS_N_PARALLEL:-1}
      - STT_ENABLED=${STT_ENABLED:-true}
      - STT_N_PARALLEL=${STT_N_PARALLEL:-1}
      - IMAGE_SERVER=${IMAGE_SERVER:-}
      - IMAGE_SERVER_API_KEY=${IMAGE_SERVER_API_KEY:-}
      - TEXT_SERVER=${TEXT_SERVER:-}
      - TEXT_SERVER_API_KEY=${TEXT_SERVER_API_KEY:-}
      - EMBEDDING_ENABLED=${EMBEDDING_ENABLED:-true}
      - EMBEDDING_SERVER=${EMBEDDING_SERVER:-}
      - EMBEDDING_SERVER_API_KEY=${EMBEDDING_SERVER_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B-GGUF}
      - EMBEDDING_MODEL_ALIAS=${EMBEDDING_MODEL_ALIAS:-Qwen3-Embedding-0.6B}
      - EMBEDDING_QUANT_TYPE=${EMBEDDING_QUANT_TYPE:-Q8_0}
      - EMBEDDING_CONTEXT_LENGTH=${EMBEDDING_CONTEXT_LENGTH:-32768}
      - EMBEDDING_N_PARALLEL=${EMBEDDING_N_PARALLEL:-1}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-512}
      - EMBEDDING_UBATCH_SIZE=${EMBEDDING_UBATCH_SIZE:-512}
      - EMBEDDING_GPU_LAYERS=${EMBEDDING_GPU_LAYERS:-auto}
      - EMBEDDING_VRAM_SAFETY_MARGIN=${EMBEDDING_VRAM_SAFETY_MARGIN:-0.75}
      - EMBEDDING_KV_CACHE_TYPE=${EMBEDDING_KV_CACHE_TYPE:-f16}
      - EMBEDDING_KEEP_LOADED=${EMBEDDING_KEEP_LOADED:-true}
      - LAZY_LOAD_VOICE=${LAZY_LOAD_VOICE:-false}
      - TTS_PROVIDER=${TTS_PROVIDER:-chatterbox}
      # Consolidate all HF downloads into /app/models so we don't cache the
      # same repo twice (once under HF's default hub dir, once under the
      # explicit cache_dir="models" used by IMG/VIDEO GGUF downloads).
      - HF_HUB_CACHE=/app/models
      - HF_HOME=/app/models
      # Optional: register with a router/load balancer
      - ROUTER_URL=${ROUTER_URL:-}
      - ROUTER_API_KEY=${ROUTER_API_KEY:-}
      - ROUTER_CLIENT_API_KEY=${ROUTER_CLIENT_API_KEY:-}
      - WORKER_LABEL=${WORKER_LABEL:-}
      - WORKER_HEARTBEAT_INTERVAL=${WORKER_HEARTBEAT_INTERVAL:-10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "5"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8091:8091"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./voices:/app/voices
      - ./whispercpp:/app/whispercpp
      - ./CosyVoice:/app/CosyVoice
      - ./pretrained_models:/app/pretrained_models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
