name: Test with ezlocalai
on:
  workflow_call:
    inputs:
      image:
        type: string
        default: joshxt/ezlocalai:main
      port:
        type: string
        default: "8091"

permissions:
  contents: read
  packages: read

jobs:
  test-ezlocalai:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      ezlocalai:
        image: ${{ inputs.image }}
        env:
          DEFAULT_MODEL: "unsloth/Qwen3.5-0.8B-GGUF"
          LLM_MAX_TOKENS: "8192"
          TTS_ENABLED: "false"
          STT_ENABLED: "false"
          IMG_MODEL: ""
        ports:
          - ${{ inputs.port }}:${{ inputs.port }}
        options: >-
          --health-cmd "curl -f http://localhost:${{ inputs.port }}"
          --health-interval 30s
          --health-timeout 600s
          --health-retries 10
          --health-start-period 10m

    steps:
      - name: List models
        run: |
          response=$(curl -sf http://localhost:${{ inputs.port }}/v1/models)
          echo "$response" | jq .
          if ! echo "$response" | jq -e 'length > 0' > /dev/null; then
            echo "FAIL: No models loaded"
            exit 1
          fi
          echo "PASS: Models endpoint returned data"

      - name: Chat completion
        run: |
          response=$(curl -sf http://localhost:${{ inputs.port }}/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{
              "model": "Qwen3.5-0.8B",
              "messages": [{"role": "user", "content": "Write a haiku about the sun."}],
              "max_tokens": 128,
              "temperature": 0.5
            }')
          echo "$response" | jq .
          content=$(echo "$response" | jq -r '.choices[0].message.content')
          if [ -z "$content" ] || [ "$content" = "null" ]; then
            echo "FAIL: No content in chat completion response"
            exit 1
          fi
          echo "PASS: Chat completion returned content (${#content} chars)"

      - name: Vision chat completion
        run: |
          response=$(curl -sf --max-time 120 http://localhost:${{ inputs.port }}/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{
              "model": "Qwen3.5-0.8B",
              "messages": [{
                "role": "user",
                "content": [
                  {"type": "text", "text": "What is in this image?"},
                  {"type": "image_url", "image_url": {"url": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png"}}
                ]
              }],
              "max_tokens": 128,
              "temperature": 0.5
            }')
          echo "$response" | jq .
          content=$(echo "$response" | jq -r '.choices[0].message.content')
          if [ -z "$content" ] || [ "$content" = "null" ]; then
            echo "FAIL: No content in vision completion response"
            exit 1
          fi
          echo "PASS: Vision completion returned content (${#content} chars)"
