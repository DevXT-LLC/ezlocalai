# Raspberry Pi 5 / ARM64 Docker Compose
#
# Prerequisites:
#   - Raspberry Pi 5 with 8GB RAM recommended
#   - 64-bit Raspberry Pi OS (Bookworm or later)
#   - Docker installed: curl -fsSL https://get.docker.com | sh
#
# Usage:
#   docker compose -f docker-compose-rpi.yml up -d
#
# Any GGUF model from HuggingFace works - just change DEFAULT_MODEL.
# Recommended models for Pi 5 (8GB):
#   - unsloth/Qwen3.5-0.6B-GGUF  (fastest, ~400MB RAM)
#   - unsloth/Qwen3.5-1.7B-GGUF  (good balance, ~1.2GB RAM)
#   - unsloth/Qwen3.5-4B-GGUF    (best quality that fits, ~3GB RAM)
#
services:
  ezlocalai:
    image: joshxt/ezlocalai:rpi
    env_file:
      - path: .env
        required: false
    environment:
      - EZLOCALAI_URL=${EZLOCALAI_URL:-http://localhost:8091}
      - EZLOCALAI_API_KEY=${EZLOCALAI_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-unsloth/Qwen3.5-0.6B-GGUF}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - IMG_MODEL=${IMG_MODEL:-}
      - VIDEO_MODEL=${VIDEO_MODEL:-}
      - LLM_BATCH_SIZE=${LLM_BATCH_SIZE:-512}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-8192}
      - QUANT_TYPE=${QUANT_TYPE:-Q4_K_XL}
      - N_PARALLEL=${N_PARALLEL:-1}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-10}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-600}
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - STT_ENABLED=${STT_ENABLED:-true}
      - TTS_PROVIDER=${TTS_PROVIDER:-chatterbox}
      - LAZY_LOAD_VOICE=${LAZY_LOAD_VOICE:-true}
      - VOICE_SERVER=${VOICE_SERVER:-}
      - VOICE_SERVER_API_KEY=${VOICE_SERVER_API_KEY:-}
      - IMAGE_SERVER=${IMAGE_SERVER:-}
      - IMAGE_SERVER_API_KEY=${IMAGE_SERVER_API_KEY:-}
      - TEXT_SERVER=${TEXT_SERVER:-}
      - TEXT_SERVER_API_KEY=${TEXT_SERVER_API_KEY:-}
      - FALLBACK_SERVER=${FALLBACK_SERVER:-}
      - FALLBACK_API_KEY=${FALLBACK_API_KEY:-}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-}
      # Optional: register with a router/load balancer
      - ROUTER_URL=${ROUTER_URL:-}
      - ROUTER_API_KEY=${ROUTER_API_KEY:-}
      - ROUTER_CLIENT_API_KEY=${ROUTER_CLIENT_API_KEY:-}
      - WORKER_LABEL=${WORKER_LABEL:-}
      - WORKER_HEARTBEAT_INTERVAL=${WORKER_HEARTBEAT_INTERVAL:-10}
      - WORKER_TUNNEL=${WORKER_TUNNEL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "8091:8091"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./voices:/app/voices
      - ./whispercpp:/app/whispercpp
