services:
  ezlocalai-router:
    container_name: ezlocalai-router
    image: joshxt/ezlocalai:latest
    environment:
      - ROUTER_MODE=true
      - EZLOCALAI_API_KEY=${EZLOCALAI_API_KEY-}
      # Optional: distinct shared secret workers must present.
      # Defaults to EZLOCALAI_API_KEY when empty.
      - ROUTER_REGISTER_KEY=${ROUTER_REGISTER_KEY-}
      # How long since the last heartbeat before a worker is considered dead.
      - ROUTER_WORKER_TTL=${ROUTER_WORKER_TTL-60}
      # Optional: set a positive cap for queue wait before returning 503.
      # Omitted/default in current code means queue until a worker becomes available.
      # - ROUTER_WAIT_TIMEOUT=${ROUTER_WAIT_TIMEOUT}
      # 0 = pick the best currently available worker immediately.
      # Positive values briefly wait for same-model workers before cross-model fallback.
      - ROUTER_CROSS_MODEL_GRACE=${ROUTER_CROSS_MODEL_GRACE-0}
      # 0 = no tier-window holdback; use any compatible idle worker.
      # Positive values only spill to idle workers within this many tier points.
      - ROUTER_IDLE_TIER_WINDOW=${ROUTER_IDLE_TIER_WINDOW-0}
      # Generic worker proxy timeout, plus a longer window for large STT jobs.
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT-300}
      - ROUTER_STT_TIMEOUT=${ROUTER_STT_TIMEOUT-7200}
      # Prefer voice/media workers for STT/TTS before mixed text/vision workers.
      - ROUTER_PREFER_DEDICATED_CAPABILITIES=${ROUTER_PREFER_DEDICATED_CAPABILITIES-stt,tts}
      # false = text/vision requests wait once every compatible node is busy.
      # true = after idle spillover, fill remaining parallel slots on busy nodes.
      - ROUTER_BUSY_SLOT_FALLBACK=${ROUTER_BUSY_SLOT_FALLBACK-false}
      - LOG_LEVEL=${LOG_LEVEL-INFO}
      - HOST=0.0.0.0
      - PORT=8092
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "8092:8092"
    volumes:
      - ./Router.py:/app/Router.py:ro
      - ./router_app.py:/app/router_app.py:ro
      - ./data:/data
      - ./router-outputs:/app/outputs
